<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Pipeline Flow</title>
<style>
  :root {
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-border-tertiary: rgba(0,0,0,0.15);
    --color-border-secondary: rgba(0,0,0,0.3);
    --color-background-primary: #ffffff;
    --font-sans: system-ui, -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #e8e6de;
      --color-text-secondary: #9c9a92;
      --color-border-tertiary: rgba(255,255,255,0.15);
      --color-border-secondary: rgba(255,255,255,0.3);
      --color-background-primary: #1c1c1a;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 16px;
  }
  .card {
    background: var(--color-background-primary);
    border: 1px solid var(--color-border-tertiary);
    border-radius: 16px;
    padding: 32px;
    max-width: 720px;
    width: 100%;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }
  h1 {
    font-size: 15px;
    font-weight: 500;
    color: var(--color-text-secondary);
    margin-bottom: 24px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  svg { width: 100%; height: auto; display: block; }

  /* SVG classes */
  .t  { font-family: var(--font-sans); font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  .ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  .th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }
  .arr { fill: none; stroke: var(--color-border-secondary); stroke-width: 1.5; }
  .leader { fill: none; stroke: var(--color-border-tertiary); stroke-width: 0.5; stroke-dasharray: 3 3; }

  /* Color ramps (light) */
  .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  .c-teal rect, .c-teal circle, .c-teal ellipse { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  .c-amber rect, .c-amber circle, .c-amber ellipse { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }

  .c-blue rect, .c-blue circle, .c-blue ellipse { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }

  .c-coral rect, .c-coral circle, .c-coral ellipse { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }

  /* Dark mode overrides */
  @media (prefers-color-scheme: dark) {
    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #3C3489; stroke: #AFA9EC; }
    .c-purple .th { fill: #CECBF6; }
    .c-purple .ts { fill: #AFA9EC; }

    .c-teal rect, .c-teal circle, .c-teal ellipse { fill: #085041; stroke: #5DCAA5; }
    .c-teal .th { fill: #9FE1CB; }
    .c-teal .ts { fill: #5DCAA5; }

    .c-amber rect, .c-amber circle, .c-amber ellipse { fill: #633806; stroke: #EF9F27; }
    .c-amber .th { fill: #FAC775; }
    .c-amber .ts { fill: #EF9F27; }

    .c-blue rect, .c-blue circle, .c-blue ellipse { fill: #0C447C; stroke: #85B7EB; }
    .c-blue .th { fill: #B5D4F4; }
    .c-blue .ts { fill: #85B7EB; }

    .c-coral rect, .c-coral circle, .c-coral ellipse { fill: #712B13; stroke: #F0997B; }
    .c-coral .th { fill: #F5C4B3; }
    .c-coral .ts { fill: #F0997B; }

    .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #444441; stroke: #B4B2A9; }
    .c-gray .th { fill: #D3D1C7; }
    .c-gray .ts { fill: #B4B2A9; }
  }

  .node { cursor: pointer; }
  .node:hover { opacity: 0.85; }

  footer {
    margin-top: 20px;
    font-size: 12px;
    color: var(--color-text-secondary);
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <h1>RAG Ingestion &amp; Query Pipeline</h1>

  <svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Title -->
    <text class="th" x="340" y="32" text-anchor="middle">RAG ingestion pipeline</text>

    <!-- Stage 1: Document parser -->
    <g class="node c-purple">
      <rect x="60" y="60" width="160" height="64" rx="8" stroke-width="0.5"/>
      <text class="th" x="140" y="84" text-anchor="middle" dominant-baseline="central">Document parser</text>
      <text class="ts" x="140" y="106" text-anchor="middle" dominant-baseline="central">PDF, HTML, DOCX, etc.</text>
    </g>

    <!-- Arrow 1 → 2 -->
    <line x1="220" y1="92" x2="256" y2="92" class="arr" marker-end="url(#arrow)"/>

    <!-- Stage 2: Chunking -->
    <g class="node c-teal">
      <rect x="256" y="60" width="168" height="64" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="84" text-anchor="middle" dominant-baseline="central">Chunking</text>
      <text class="ts" x="340" y="106" text-anchor="middle" dominant-baseline="central">Split into passages</text>
    </g>

    <!-- Arrow 2 → 3 -->
    <line x1="424" y1="92" x2="460" y2="92" class="arr" marker-end="url(#arrow)"/>

    <!-- Stage 3: Embedding -->
    <g class="node c-amber">
      <rect x="460" y="60" width="160" height="64" rx="8" stroke-width="0.5"/>
      <text class="th" x="540" y="84" text-anchor="middle" dominant-baseline="central">Embedding model</text>
      <text class="ts" x="540" y="106" text-anchor="middle" dominant-baseline="central">Chunk → dense vector</text>
    </g>

    <!-- Arrow 3 down to Qdrant -->
    <line x1="540" y1="124" x2="540" y2="186" class="arr" marker-end="url(#arrow)"/>

    <!-- Stage 4: Qdrant vector store -->
    <g class="node c-blue">
      <rect x="380" y="186" width="260" height="64" rx="8" stroke-width="0.5"/>
      <text class="th" x="510" y="210" text-anchor="middle" dominant-baseline="central">Qdrant vector store</text>
      <text class="ts" x="510" y="232" text-anchor="middle" dominant-baseline="central">Index + store vectors with payload</text>
    </g>

    <!-- Divider -->
    <line x1="60" y1="298" x2="620" y2="298" stroke-dasharray="4 4" stroke-width="0.5" stroke="rgba(128,128,128,0.4)" fill="none"/>
    <text class="ts" x="340" y="315" text-anchor="middle">Query time</text>

    <!-- Query box -->
    <g class="node c-gray">
      <rect x="60" y="328" width="140" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="130" y="352" text-anchor="middle" dominant-baseline="central">User query</text>
      <text class="ts" x="130" y="370" text-anchor="middle" dominant-baseline="central">Embed query</text>
    </g>

    <!-- Arrow query → Qdrant search -->
    <line x1="200" y1="356" x2="240" y2="356" class="arr" marker-end="url(#arrow)"/>

    <!-- Qdrant search -->
    <g class="node c-blue">
      <rect x="240" y="328" width="200" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="350" text-anchor="middle" dominant-baseline="central">Qdrant search</text>
      <text class="ts" x="340" y="368" text-anchor="middle" dominant-baseline="central">ANN similarity search</text>
    </g>

    <!-- Arrow search → LLM -->
    <line x1="440" y1="356" x2="480" y2="356" class="arr" marker-end="url(#arrow)"/>

    <!-- LLM + context -->
    <g class="node c-coral">
      <rect x="480" y="328" width="140" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="550" y="350" text-anchor="middle" dominant-baseline="central">LLM</text>
      <text class="ts" x="550" y="368" text-anchor="middle" dominant-baseline="central">Generate with context</text>
    </g>

    <!-- Vertical connector: Qdrant store → Qdrant search -->
    <path d="M510 250 L510 270 L340 270 L340 328" fill="none" stroke="rgba(128,128,128,0.35)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    <text class="ts" x="420" y="265" text-anchor="middle">retrieve top-k</text>
  </svg>

  <footer>RAG Pipeline · Document Parser → Chunking → Qdrant</footer>
</div>
</body>
</html>
